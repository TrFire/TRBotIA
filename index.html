<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#111b21">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TRBot IA</title>
    
    <link id="manifest-link" rel="manifest" href="">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2300a884'/><text x='50' y='68' font-size='60' fill='white' font-weight='bold' text-anchor='middle' font-family='sans-serif'>T</text></svg>">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { overscroll-behavior-y: none; font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 0; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const manifest = {
            name: "TRBot IA", short_name: "TRBot IA", start_url: "./", display: "standalone", background_color: "#111b21", theme_color: "#111b21",
            icons: [{ src: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2300a884'/><text x='50' y='68' font-size='60' fill='white' font-weight='bold' text-anchor='middle' font-family='sans-serif'>T</text></svg>", sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
        document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ d, size = 24, className = "", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{d ? <path d={d} /> : children}</svg>
        );
        const MessageSquare = (p) => <Icon d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" {...p} />;
        const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
        const Settings = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></Icon>;
        const User = (p) => <Icon {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
        const Bot = (p) => <Icon {...p}><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></Icon>;
        const Smartphone = (p) => <Icon {...p}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></Icon>;
        const Copy = (p) => <Icon {...p}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></Icon>;
        const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
        const Server = (p) => <Icon {...p}><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></Icon>;

        function App() {
            const [activeTab, setActiveTab] = useState('settings');
            const [backendUrl, setBackendUrl] = useState('https://trbot-backend-motor.onrender.com');
            const [phoneNumber, setPhoneNumber] = useState('');
            const [pairingCode, setPairingCode] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [linkError, setLinkError] = useState('');
            const [copied, setCopied] = useState(false);

            const handleGenerateCode = async () => {
                if (!phoneNumber || phoneNumber.length < 8) {
                    setLinkError('Insira um número válido (ex: 5511999999999).');
                    return;
                }
                
                setIsGenerating(true);
                setLinkError('');
                setCopied(false);
                
                try {
                    const cleanPhone = phoneNumber.replace(/\D/g, '');
                    const response = await fetch(`${backendUrl}/api/pair-code`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: cleanPhone })
                    });
                    
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error || 'Falha ao gerar o código.');
                    setPairingCode(data.code);
                } catch (error) {
                    setLinkError(error.message || `Erro de ligação ao servidor.`);
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleCopyCode = () => {
                const codeToCopy = pairingCode.replace('-', '');
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        navigator.clipboard.writeText(codeToCopy);
                    } else {
                        const textArea = document.createElement("textarea");
                        textArea.value = codeToCopy;
                        textArea.style.position = "absolute";
                        textArea.style.left = "-999999px";
                        document.body.prepend(textArea);
                        textArea.select();
                        try {
                            document.execCommand('copy');
                        } catch (error) {
                            console.error(error);
                        } finally {
                            textArea.remove();
                        }
                    }
                    setCopied(true);
                    setTimeout(() => setCopied(false), 3000);
                } catch (err) {
                    console.error('Falha ao copiar', err);
                }
            };

            return (
                <div className="flex h-[100dvh] w-full bg-slate-50 font-sans overflow-hidden">
                    <div className="w-16 lg:w-64 bg-[#111b21] text-white flex flex-col transition-all duration-300 flex-shrink-0">
                        <div className="p-3 lg:p-4 flex items-center justify-center lg:justify-start border-b border-slate-700/50 h-16">
                            <div className="bg-[#00a884] p-1.5 lg:p-2 rounded-lg"><Bot size={20} className="text-white" /></div>
                            <span className="hidden lg:block ml-3 font-bold text-lg tracking-wide">TRBot IA</span>
                        </div>
                        <nav className="flex-1 py-4 flex flex-col gap-2 px-2 lg:px-4">
                            <button onClick={() => setActiveTab('settings')} className={`w-full flex items-center justify-center lg:justify-start gap-3 p-3 rounded-xl transition-all ${activeTab === 'settings' ? 'bg-[#1e2b33] text-[#00a884] font-medium' : 'text-slate-400 hover:bg-[#1e2b33]'}`}>
                                <Settings size={20} /> <span className="hidden lg:block text-sm">Definições</span>
                            </button>
                        </nav>
                    </div>

                    {activeTab === 'settings' && (
                        <div className="flex-1 overflow-y-auto p-4 md:p-8">
                            <div className="max-w-2xl mx-auto">
                                <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-6">Vinculação WhatsApp</h1>

                                {/* Secção URL do Servidor */}
                                <div className="bg-white rounded-xl shadow-sm border p-4 md:p-6 mb-4 space-y-4 border-l-4 border-l-blue-500">
                                    <h3 className="font-bold flex items-center gap-2 text-lg">
                                        <Server size={20} className="text-blue-500" /> Ligação ao Servidor (Motor)
                                    </h3>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">URL do Servidor</label>
                                        <input 
                                            type="url" 
                                            value={backendUrl}
                                            onChange={(e) => setBackendUrl(e.target.value)}
                                            placeholder="https://trbot-backend-motor.onrender.com" 
                                            className="w-full p-2.5 border border-slate-300 rounded-lg text-sm outline-none focus:border-blue-500 transition-colors bg-blue-50/30" 
                                        />
                                    </div>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border p-4 md:p-6 mb-4 space-y-4">
                                    <h3 className="font-bold flex items-center gap-2 text-lg">
                                        <Smartphone size={20} className="text-[#00a884]" /> Conectar no mesmo aparelho
                                    </h3>
                                    
                                    {!pairingCode ? (
                                        <div className="space-y-4">
                                            <p className="text-sm text-slate-500">
                                                Insira o número exato do seu WhatsApp (ex: 5511999999999). 
                                            </p>
                                            <div className="flex flex-col gap-3">
                                                <input 
                                                    type="tel" 
                                                    placeholder="55 + DDD + Número" 
                                                    value={phoneNumber}
                                                    onChange={(e) => { setPhoneNumber(e.target.value.replace(/[^\d+]/g, '')); setLinkError(''); }}
                                                    className="w-full p-4 border-2 border-slate-200 rounded-xl text-lg font-medium outline-none focus:border-[#00a884] transition-colors" 
                                                />
                                                <button 
                                                    onClick={handleGenerateCode}
                                                    disabled={isGenerating || !phoneNumber}
                                                    className="bg-[#00a884] text-white px-6 py-4 rounded-xl text-base font-bold shadow-md hover:bg-[#008f6f] disabled:opacity-50 transition-colors w-full flex items-center justify-center"
                                                >
                                                    {isGenerating ? 'A gerar código...' : 'Gerar Código de Acesso'}
                                                </button>
                                            </div>
                                            {linkError && <div className="p-3 bg-red-50 text-red-700 rounded-lg border border-red-200 text-sm">{linkError}</div>}
                                        </div>
                                    ) : (
                                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-5 text-center shadow-inner animate-in fade-in">
                                            <p className="text-sm text-slate-600 font-medium mb-3">O seu código de acesso:</p>
                                            
                                            <div className="text-4xl font-mono font-bold tracking-[0.2em] text-slate-800 bg-white border-2 border-slate-200 py-4 px-2 rounded-lg mx-auto max-w-xs shadow-sm mb-4">
                                                {pairingCode}
                                            </div>
                                            
                                            <button 
                                                onClick={handleCopyCode}
                                                className={`w-full mb-6 py-4 px-6 rounded-xl text-base font-bold shadow-md transition-all flex items-center justify-center gap-2 ${copied ? 'bg-[#d9fdd3] text-[#128c7e] border border-[#25D366]' : 'bg-[#111b21] text-white hover:bg-slate-800'}`}
                                            >
                                                {copied ? <Check size={20} /> : <Copy size={20} />}
                                                {copied ? 'Código Copiado!' : 'Copiar Código'}
                                            </button>

                                            <div className="text-sm text-slate-700 text-left space-y-3 bg-white p-5 rounded-lg border border-slate-200 shadow-sm">
                                                <p className="font-bold text-[#00a884] mb-2 uppercase text-xs tracking-wider">Como colar no WhatsApp:</p>
                                                <p className="flex items-start gap-3">
                                                    <span className="bg-slate-200 text-slate-600 rounded-full w-6 h-6 flex items-center justify-center shrink-0 font-bold text-xs">1</span> 
                                                    Abra o seu WhatsApp e vá a <strong>Configurações (ou 3 pontinhos)</strong>.
                                                </p>
                                                <p className="flex items-start gap-3">
                                                    <span className="bg-slate-200 text-slate-600 rounded-full w-6 h-6 flex items-center justify-center shrink-0 font-bold text-xs">2</span> 
                                                    Toque em <strong>Aparelhos Associados</strong>.
                                                </p>
                                                <p className="flex items-start gap-3">
                                                    <span className="bg-slate-200 text-slate-600 rounded-full w-6 h-6 flex items-center justify-center shrink-0 font-bold text-xs">3</span> 
                                                    Toque em <strong>Conectar um aparelho</strong>.
                                                </p>
                                                <p className="flex items-start gap-3 bg-yellow-50 p-2 rounded-lg border border-yellow-100">
                                                    <span className="bg-[#00a884] text-white rounded-full w-6 h-6 flex items-center justify-center shrink-0 font-bold text-xs">4</span> 
                                                    No ecrã da câmara, toque em <strong>"Conectar com número de telefone"</strong> (no fundo) e cole o código!
                                                </p>
                                            </div>
                                            
                                            <button onClick={() => { setPairingCode(''); setPhoneNumber(''); }} className="text-slate-500 text-sm font-medium mt-6 hover:text-[#00a884] underline">
                                                Gerar novo código
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
