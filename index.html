<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRBot IA</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans m-0 p-0 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Ícones básicos
        const Icon = ({ d, size = 24, className = "", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{d ? <path d={d} /> : children}</svg>
        );
        const Settings = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></Icon>;
        const Bot = (p) => <Icon {...p}><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></Icon>;
        const Smartphone = (p) => <Icon {...p}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></Icon>;
        const QrCode = (p) => <Icon {...p}><rect x="3" y="3" width="6" height="6" rx="1"/><rect x="15" y="3" width="6" height="6" rx="1"/><rect x="3" y="15" width="6" height="6" rx="1"/><path d="M21 16v5"/><path d="M16 21h5"/><path d="M16 16h5"/><path d="M11 3v6"/><path d="M11 15v6"/><path d="M3 11h6"/><path d="M15 11h6"/></Icon>;
        const Server = (p) => <Icon {...p}><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></Icon>;
        const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
        const Copy = (p) => <Icon {...p}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></Icon>;

        function App() {
            const [backendUrl, setBackendUrl] = useState('https://trbot-backend-motor.onrender.com');
            const [isConnected, setIsConnected] = useState(false);
            
            // Estado do QR Code
            const [qrImage, setQrImage] = useState(null);
            const [isGeneratingQR, setIsGeneratingQR] = useState(false);
            const [qrError, setQrError] = useState('');
            
            // Estado do Código Numérico
            const [phoneNumber, setPhoneNumber] = useState('');
            const [pairingCode, setPairingCode] = useState('');
            const [isGeneratingCode, setIsGeneratingCode] = useState(false);
            const [codeError, setCodeError] = useState('');
            const [copied, setCopied] = useState(false);

            // FUNÇÃO 1: GERAR QR CODE
            const handleGenerateQR = async () => {
                setIsGeneratingQR(true); setQrError(''); setQrImage(null); setPairingCode(''); setIsConnected(false);
                try {
                    await fetch(`${backendUrl}/api/start-qr`, { method: 'POST' });
                    
                    const intervalId = setInterval(async () => {
                        try {
                            const statusRes = await fetch(`${backendUrl}/api/status`);
                            const statusData = await statusRes.json();
                            
                            if (statusData.connected) {
                                clearInterval(intervalId);
                                setIsConnected(true); setIsGeneratingQR(false); setQrImage(null);
                            } else {
                                const qrRes = await fetch(`${backendUrl}/api/qr`);
                                if (qrRes.ok) {
                                    const qrData = await qrRes.json();
                                    setQrImage(qrData.qr);
                                    setIsGeneratingQR(false);
                                }
                            }
                        } catch (e) { console.error(e); }
                    }, 2000);

                    setTimeout(() => {
                        clearInterval(intervalId);
                        if (!isConnected && !qrImage) { setQrError('Tempo esgotado.'); setIsGeneratingQR(false); }
                    }, 60000);
                } catch (error) {
                    setQrError(`Erro ao ligar ao servidor.`); setIsGeneratingQR(false);
                }
            };

            // FUNÇÃO 2: GERAR CÓDIGO NUMÉRICO
            const handleGenerateCode = async () => {
                if (!phoneNumber || phoneNumber.length < 8) { setCodeError('Insira um número válido.'); return; }
                setIsGeneratingCode(true); setCodeError(''); setPairingCode(''); setQrImage(null); setIsConnected(false);
                try {
                    const cleanPhone = phoneNumber.replace(/\D/g, '');
                    const response = await fetch(`${backendUrl}/api/pair-code`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ phone: cleanPhone })
                    });
                    
                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error || 'Falha ao gerar o código.');
                    setPairingCode(data.code);
                    
                    // Ficar verificando status também
                    const intervalId = setInterval(async () => {
                        const statusRes = await fetch(`${backendUrl}/api/status`);
                        const statusData = await statusRes.json();
                        if (statusData.connected) {
                            clearInterval(intervalId); setIsConnected(true); setPairingCode('');
                        }
                    }, 3000);

                } catch (error) {
                    setCodeError(error.message);
                } finally {
                    setIsGeneratingCode(false);
                }
            };

            // Função para Copiar Código
            const handleCopyCode = () => {
                const codeToCopy = pairingCode.replace('-', '');
                try {
                    if (navigator.clipboard) navigator.clipboard.writeText(codeToCopy);
                    else {
                        const ta = document.createElement("textarea"); ta.value = codeToCopy;
                        ta.style.position = "absolute"; ta.style.left = "-9999px";
                        document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
                    }
                    setCopied(true); setTimeout(() => setCopied(false), 3000);
                } catch (err) {}
            };

            return (
                <div className="flex h-[100dvh] w-full bg-slate-50 overflow-hidden">
                    {/* Menu Lateral */}
                    <div className="w-16 lg:w-64 bg-[#111b21] text-white flex flex-col flex-shrink-0">
                        <div className="p-3 lg:p-4 flex items-center justify-center lg:justify-start border-b border-slate-700/50 h-16">
                            <div className="bg-[#00a884] p-1.5 lg:p-2 rounded-lg"><Bot size={20} /></div>
                            <span className="hidden lg:block ml-3 font-bold text-lg">TRBot IA</span>
                        </div>
                        <nav className="flex-1 py-4 flex flex-col gap-2 px-2 lg:px-4">
                            <button className="w-full flex items-center justify-center lg:justify-start gap-3 p-3 rounded-xl bg-[#1e2b33] text-[#00a884] font-medium">
                                <Settings size={20} /> <span className="hidden lg:block text-sm">Definições</span>
                            </button>
                        </nav>
                    </div>

                    {/* Tela de Configurações */}
                    <div className="flex-1 overflow-y-auto p-4 md:p-8">
                        <div className="max-w-4xl mx-auto">
                            <h1 className="text-xl md:text-2xl font-bold text-slate-800 mb-6">Vinculação WhatsApp</h1>

                            {/* Servidor */}
                            <div className="bg-white rounded-xl shadow-sm border p-4 mb-6 border-l-4 border-l-blue-500">
                                <h3 className="font-bold flex items-center gap-2 text-lg mb-2"><Server size={20} className="text-blue-500" /> Servidor Node.js</h3>
                                <input type="url" value={backendUrl} onChange={(e) => setBackendUrl(e.target.value)}
                                       className="w-full p-2 border border-slate-300 rounded-lg text-sm outline-none focus:border-blue-500 bg-blue-50/30" />
                            </div>

                            {isConnected ? (
                                <div className="bg-[#d9fdd3] border border-[#25D366] rounded-xl p-8 text-center mb-6 shadow-sm">
                                    <Check size={48} className="mx-auto text-[#25D366] mb-3" />
                                    <h2 className="text-2xl font-bold text-[#128c7e]">WhatsApp Conectado!</h2>
                                    <p className="text-[#128c7e] mt-2">O seu robô está ativo e pronto a operar.</p>
                                    <button onClick={() => setIsConnected(false)} className="mt-4 text-sm text-[#128c7e] underline">Desconectar e tentar outro número</button>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    
                                    {/* OPÇÃO 1: QR CODE */}
                                    <div className="bg-white rounded-xl shadow-sm border p-6 flex flex-col items-center">
                                        <h3 className="font-bold flex items-center gap-2 text-lg mb-2 w-full justify-center">
                                            <QrCode size={20} className="text-[#00a884]" /> Ligar por QR Code
                                        </h3>
                                        <p className="text-sm text-slate-500 text-center mb-6">Recomendado se estiver a usar dois aparelhos.</p>
                                        
                                        <div className="w-56 h-56 bg-slate-50 border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center mb-6 relative overflow-hidden">
                                            {qrImage ? (
                                                <img src={qrImage} alt="QR Code" className="w-full h-full object-contain p-2" />
                                            ) : isGeneratingQR ? (
                                                <div className="text-slate-400 text-center">A gerar...</div>
                                            ) : (
                                                <QrCode size={48} className="text-slate-300" />
                                            )}
                                        </div>
                                        
                                        <button onClick={handleGenerateQR} disabled={isGeneratingQR || isGeneratingCode} className="w-full bg-[#00a884] text-white py-3 rounded-lg font-bold hover:bg-[#008f6f] disabled:opacity-50">
                                            {qrImage ? 'Atualizar QR Code' : 'Gerar QR Code'}
                                        </button>
                                        {qrError && <p className="text-red-500 text-xs mt-3">{qrError}</p>}
                                    </div>

                                    {/* OPÇÃO 2: CÓDIGO NUMÉRICO */}
                                    <div className="bg-white rounded-xl shadow-sm border p-6 flex flex-col items-center">
                                        <h3 className="font-bold flex items-center gap-2 text-lg mb-2 w-full justify-center">
                                            <Smartphone size={20} className="text-[#00a884]" /> Ligar por Código
                                        </h3>
                                        <p className="text-sm text-slate-500 text-center mb-6">Recomendado para conectar no próprio telemóvel.</p>

                                        {!pairingCode ? (
                                            <div className="w-full space-y-4">
                                                <input type="tel" placeholder="Ex: 5511999999999" value={phoneNumber} onChange={(e) => setPhoneNumber(e.target.value.replace(/[^\d+]/g, ''))}
                                                       className="w-full p-4 border border-slate-300 rounded-lg text-center text-lg outline-none focus:border-[#00a884]" />
                                                <button onClick={handleGenerateCode} disabled={isGeneratingCode || !phoneNumber || isGeneratingQR} className="w-full bg-[#111b21] text-white py-3 rounded-lg font-bold hover:bg-slate-800 disabled:opacity-50">
                                                    {isGeneratingCode ? 'A gerar...' : 'Gerar Código Numérico'}
                                                </button>
                                                {codeError && <p className="text-red-500 text-xs mt-3 text-center">{codeError}</p>}
                                            </div>
                                        ) : (
                                            <div className="w-full bg-slate-50 rounded-xl p-4 border border-slate-200 text-center">
                                                <div className="text-3xl font-mono font-bold tracking-[0.2em] text-slate-800 bg-white border border-slate-200 py-4 px-2 rounded-lg mb-4">
                                                    {pairingCode}
                                                </div>
                                                <button onClick={handleCopyCode} className={`w-full py-3 rounded-lg font-bold flex items-center justify-center gap-2 mb-4 ${copied ? 'bg-[#d9fdd3] text-[#128c7e]' : 'bg-[#111b21] text-white'}`}>
                                                    {copied ? <Check size={18} /> : <Copy size={18} />} {copied ? 'Copiado!' : 'Copiar Código'}
                                                </button>
                                                <button onClick={() => setPairingCode('')} className="text-slate-500 text-xs underline">Gerar novo código</button>
                                            </div>
                                        )}
                                    </div>

                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
